schema_version: "1.1"
organ: ORGAN-I
org: organvm-i-theoria
repo: conversation-corpus-engine

metadata:
  tier: standard
  promotion_status: GRADUATED
  version: "0.3.0"
  description: >-
    Canonical corpus and federation engine for multi-provider AI conversation memory.
    Owns provider import, evaluation, governance, federation, triage automation,
    operator dashboard, review-assist campaigns, and Meta/MCP surface exports.
    Supports 8 providers (ChatGPT and Claude with live local-session adapters)
    and full dedicated module-level regression coverage.
  language: python
  license: MIT

functional_class: ENGINE
functional_class_secondary: INFRASTRUCTURE
formation_type: GENERATOR

implements:
  - concept: formation_protocol
    zettel_source: "post-flood/archive_original/.zettel-index.yaml#formation_protocol"
    aspect: "GENERATOR formation — produces ANNOTATED_CORPUS, ARCHIVE_PACKET, VALIDATION_RECORD signals"
  - concept: autopoiesis
    zettel_source: "post-flood/archive_original/.zettel-index.yaml#autopoiesis"
    aspect: "Self-maintaining corpus — federation imports, evaluates, and governs its own completeness"
  - concept: AMMOI
    zettel_source: "post-flood/archive_original/.zettel-index.yaml#AMMOI"
    aspect: "Hierarchical indexing of conversation knowledge across providers and organs"

signal_inputs:
  - ANNOTATED_CORPUS
  - EXECUTION_TRACE
  - ARCHIVE_PACKET

signal_outputs:
  - ANNOTATED_CORPUS
  - ARCHIVE_PACKET
  - VALIDATION_RECORD
  - STATE_MODEL

produces:
  - type: surface-manifest
    signal_class: STATE_MODEL
    consumers: [META-ORGANVM]
  - type: mcp-context
    signal_class: STATE_MODEL
    consumers: [META-ORGANVM]
  - type: surface-bundle
    signal_class: VALIDATION_RECORD
    consumers: [META-ORGANVM]
  - type: corpus-contract-schema
    signal_class: INTERFACE_CONTRACT
    consumers: [META-ORGANVM]
  - type: evaluation-scorecard
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: dashboard-payload
    signal_class: STATE_MODEL
    consumers: [ORGAN-I]
  - type: triage-plan
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: review-campaign-report
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: review-rollup
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: review-packet-hydration
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: review-scoreboard
    signal_class: STATE_MODEL
    consumers: [ORGAN-I]
  - type: review-apply-plan
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: import-audit
    signal_class: EXECUTION_TRACE
    consumers: [ORGAN-I]
  - type: near-duplicates
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-I]
  - type: conversation-evidence
    signal_class: VALIDATION_RECORD
    consumers: [ORGAN-III]
  - type: curated-conversations
    signal_class: ANNOTATED_CORPUS
    consumers: [ORGAN-III]
  - type: corpus-deployment
    signal_class: STATE_MODEL
    consumers: [ORGAN-III]

consumes:
  - type: provider-exports
    signal_class: ARCHIVE_PACKET
    source: external
  - type: governance-rules
    signal_class: RULE_PROPOSAL
    source: META-ORGANVM

subscriptions:
  - event: governance.updated
    source: META-ORGANVM
  - event: schema.registry.sync
    source: META-ORGANVM
